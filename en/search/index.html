source karma!\",\"disclaimer\":\"Some questions are AI-generated in real-time and may contain errors. If you find any issues, feel free to join our community via the homepage. This is just a snapshot—one score doesn't define you. Don't take it too seriously.\",\"scoringMethod\":\"How this score is calculated\",\"scoringIrtDesc\":\"This test used \u003cstrong\u003eadaptive IRT estimation\u003c/strong\u003e. Questions were selected based on your real-time ability level — each answer refined the estimate. Your final ability (θ) was mapped to a percentile via the normal distribution, then inverted to produce the degradation index. This means \u003cstrong\u003ewhich\u003c/strong\u003e questions you got right matters as much as how many.\",\"scoringPctDesc\":\"This test used \u003cstrong\u003efixed-percentage scoring\u003c/strong\u003e. Your degradation index is simply the percentage of questions you got wrong: \u003ccode\u003e100 − (correct / total × 100)\u003c/code\u003e. Every question carries equal weight regardless of difficulty.\",\"scoringCalcTitle\":\"How this score is calculated\",\"scoringIrtSteps\":\"\u003cstrong\u003eIRT Adaptive Estimation\u003c/strong\u003e\",\"scoringIrtTheta\":\"Ability estimate (θ)\",\"scoringIrtPercentile\":\"Percentile Φ(θ)\",\"scoringIrtFormula\":\"Degradation index = 100 − Φ(θ) × 100\",\"scoringPctSteps\":\"\u003cstrong\u003eFixed-Percentage Scoring\u003c/strong\u003e\",\"scoringPctRate\":\"Correct / Total\",\"scoringPctFormula\":\"Degradation index = 100 − (correct / total × 100)\",\"scoringIrtResult\":\"Degradation index\",\"scoringByDimension\":\"Per-dimension ability\",\"reviewPartial\":\"Partial ({score}%)\",\"aiInterpretTitle\":\"AI Deep Analysis\",\"aiInterpretDesc\":\"AI will generate a personalized cognitive analysis based on your test data\",\"aiInterpretButton\":\"Generate AI Analysis\",\"aiInterpretRegenerate\":\"Regenerate\",\"aiInterpretLoading\":\"Analyzing your cognitive data…\",\"aiInterpretError\":\"Generation failed, please try again\",\"aiInterpretPremiumOnly\":\"Premium Feature\",\"aiInterpretAnnounceTitle\":\"New: AI Deep Analysis\",\"aiInterpretAnnounceDesc\":\"You can now use AI analysis on the test results page to get a personalized cognitive analysis report based on your test data.\",\"aiInterpretAnnounceCta\":\"Got it\"},\"search\":{\"title\":\"Search Questions\",\"placeholder\":\"Search by keyword...\",\"noResults\":\"No matching questions found\",\"resultCount\":\"{count} results\",\"expand\":\"Show explanation\",\"collapse\":\"Hide explanation\",\"correctAnswer\":\"Correct answer\",\"diffEasy\":\"Easy\",\"diffMedium\":\"Medium\",\"diffHard\":\"Hard\",\"thetaLabel\":\"θ={theta}\",\"scoreLabel\":\"score: {score}\",\"fromBank\":\"Bank\"},\"stats\":{\"pageTitle\":\"Platform-wide Statistics\",\"pageSubtitle\":\"Cognitive Rustproof · Baseline Test\",\"loading\":\"Loading...\",\"errorTitle\":\"Unable to fetch statistics at this time\",\"emptyTitle\":\"No data yet\",\"emptyDesc\":\"Be the first to complete the test!\",\"emptyCta\":\"Start Test\",\"totalTests\":\"Total Tests\",\"avgDegradation\":\"Avg Degradation Index\",\"yourRank\":\"Your Rank\",\"ranking\":\"Ahead of {count} people\",\"rankedBehind\":\"Behind {count} people\",\"tied\":\"Tied with {count}\",\"distributionTitle\":\"Degradation Index Distribution\",\"distributionDesc\":\"Where most people's scores cluster\",\"aiGroupTitle\":\"Grouped by AI Usage\",\"aiGroupDesc\":\"Group sizes and average degradation index\",\"tierTitle\":\"Tier Distribution\",\"trendTitle\":\"Personal Trend\",\"trendDesc\":\"Your {count} test records\",\"trendOverall\":\"Overall\",\"trendLogic\":\"Logic\",\"trendMath\":\"Mental Math\",\"trendVocab\":\"Vocabulary\",\"trendEvent\":\"Event\",\"trendFirst\":\"First\",\"trendLatest\":\"Latest\",\"trendFlat\":\"→ Flat\",\"trendAxis\":\"Test Number\",\"privacyNote\":\"All data is collected anonymously and only used to generate statistical distributions\",\"aiLevelSuffix\":\"people\",\"trendAria\":\"Personal degradation index trend\",\"estimationTitle\":\"Estimation Method\",\"estimationIRT\":\"IRT Adaptive\",\"noData\":\"No data\",\"notEnough\":\"Not enough data\",\"estimationFixed\":\"Fixed Percentage\",\"aboutLink\":\"About\",\"author\":\"Hsiang Nianian\",\"otherGame\":\"Another Game\",\"ddlRoast\":\"DDL Roast\",\"otherXingce\":\"Another XingCe\",\"estimationMixedDesc\":\"IRT adapts question difficulty to your ability; fixed percentage weights every question equally.\",\"estimationIrtOnlyDesc\":\"All tests so far have used IRT adaptive estimation — questions adapt to your ability level in real time.\",\"estimationPctOnlyDesc\":\"All tests so far have used fixed-percentage scoring — every question carries equal weight.\",\"abuseWarningTitle\":\"Data Authenticity Notice\",\"abuseWarningDesc\":\"We have detected automated script submissions that may have affected some statistics. Results may include unverified test data in certain tiers. Protective measures have been implemented. Thank you for your understanding.\"},\"siteGoal\":{\"achieved\":\"Site goal achieved!\",\"title\":\"Goal\",\"progressAchieved\":\"Avg degradation {current}, below target {goal}\",\"progressBelow\":\"Avg degradation {current} → target \u003c {goal}\",\"participants\":\"{count} tests taken · working together to lower the avg degradation index\"},\"about\":{\"title\":\"About\",\"subtitle\":\"Cognitive Rustproof · Project Origins\",\"originTitle\":\"Why This Project\",\"originP1\":\"Since 2024, I've noticed myself increasingly throwing questions straight to AI instead of thinking them through first. My first reaction to a tough problem shifted from \\\"let me think\\\" to \\\"let me ask.\\\" This shift is comfortable—but also unsettling.\",\"originP2\":\"\\\"Cognitive Rustproof\\\" isn't about denying the value of AI tools. It's about providing a simple way to regularly take a snapshot of your cognitive state. Not to prove anything, just to make the trend visible—because what you can't see, you won't care about.\",\"usageTitle\":\"How to Use\",\"usageP1\":\"Complete {count} mixed-format questions (Logic / Mental Math / Vocabulary), each with a {seconds}-second time limit. After completion, you'll receive a cognitive activity score (0-100). The lower the score, the more active.\",\"usageP2\":\"A single test score has limited meaning—the real value lies in retesting. Leave at least 7 days between tests and connect the dots to see the trend.\",\"privacyTitle\":\"Data \u0026 Privacy\",\"privacyP1\":\"We do not collect any personally identifiable information (no cookies, no user IDs). Each test result is stored anonymously and only used to generate platform-wide statistical distributions. Your personal history is saved in your browser locally and is not uploaded.\",\"disclaimerTitle\":\"Disclaimer\",\"disclaimerP1\":\"Some question types are AI-generated in real-time with adaptive difficulty. There may be errors or imprecise wording—please bear with us.\",\"disclaimerP2\":\"If you spot incorrect questions, feel free to join our community via the homepage to give feedback and help us improve the question bank.\",\"disclaimerP3\":\"This is a self-awareness tool, not a clinical assessment. A single score means little—don't take it too seriously. Trends matter more than any one result.\",\"ossTitle\":\"Open Source\",\"ossP1\":\"Cognitive Rustproof is an open-source project. Official site: \u003cofficialSite\u003ecortex.hydroroll.team\u003c/officialSite\u003e. Source code on \u003cgithub\u003eGitHub\u003c/github\u003e — contributions and feedback welcome!\",\"signature\":\"May 7, 2026\\nHsiang Nianian\",\"footerBack\":\"Back to Test\",\"irtTitle\":\"How IRT Scoring Works\",\"irtP1\":\"This test uses \u003cstrong\u003eItem Response Theory (IRT)\u003c/strong\u003e, the same framework behind the SAT, GRE, and professional certification exams. Unlike simple percentage scoring, IRT accounts for \u003cstrong\u003ewhich\u003c/strong\u003e questions you got right, not just \u003cstrong\u003ehow many\u003c/strong\u003e. Getting an easy question wrong hurts more; getting a hard question right boosts more.\",\"irtP2\":\"Each question has three parameters: \u003cstrong\u003edifficulty\u003c/strong\u003e (how hard it is), \u003cstrong\u003ediscrimination\u003c/strong\u003e (how well it separates ability levels), and \u003cstrong\u003eguessing\u003c/strong\u003e (chance of guessing correctly). Together they form a 3PL logistic curve that models the probability of a correct answer at any ability level.\",\"irtP3\":\"During the test, after each answer the system re-estimates your ability (θ) and picks the next question to maximize \u003cstrong\u003eFisher information\u003c/strong\u003e — the question that will tell us the most about you at your current estimated level. This is why the test can feel harder when you are doing well and easier when you are struggling.\",\"irtP4\":\"At the end, your ability θ is estimated via \u003cstrong\u003eEAP (Expected A Posteriori)\u003c/strong\u003e, a Bayesian method that finds the most likely ability value given your full response pattern. The result is a theta score in logits, typically ranging from −3 to +3.\",\"irtP5\":\"Finally, your theta is mapped to a percentile using the standard normal distribution: θ = 0 (average) → 50th percentile → degradation index 50. θ = +1.5 (top ~7%) → degradation index ~7. This produces your final 0–100 degradation index where \u003cstrong\u003elower is better\u003c/strong\u003e.\",\"irtCtaPrefix\":\"Want the full technical details? \",\"irtCtaLink\":\"Read the deep dive article\",\"irtCtaSuffix\":\" on our blog.\"},\"share\":{\"loading\":\"Redirecting...\",\"clickHere\":\"Click here\",\"titleLine\":\"See if AI has turned you into an idiot!\"},\"distribution\":{\"ariaLabel\":\"Degradation index distribution histogram\",\"xAxis\":\"Degradation Index\",\"userMarker\":\"You are here\",\"yourResult\":\"Your Result\",\"exceeds\":\"Exceeds {pct}% of participants\",\"degradationLabel\":\"Degradation Index\"},\"tier\":{\"cognitivePeak\":\"Cognitive Peak\",\"mildDecline\":\"Mild Decline\",\"moderateDecline\":\"Moderate Decline\",\"significantDecline\":\"Significant Decline\",\"severeDecline\":\"Severe Decline\",\"cognitivePeakDesc\":\"Your core cognitive abilities are in excellent shape. Even with frequent AI tool use, you maintain independent deep-thinking habits. You likely approach AI with critical thinking, treating it as a tool rather than a substitute.\",\"cognitivePeakAdvice\":\"Keep up your current habits. You've proven that AI and independent thinking can coexist.\",\"mildDeclineDesc\":\"Your cognitive abilities are generally good, but some early signs of decline are appearing. You may be starting to unconsciously rely on AI for certain types of thinking.\",\"mildDeclineAdvice\":\"Before asking AI for help, give yourself 30 seconds to think independently. This small habit can effectively halt the decline.\",\"moderateDeclineDesc\":\"Your cognitive activity has dropped noticeably. Daily over-reliance on AI for thinking tasks may be silently weakening your independent analytical skills.\",\"moderateDeclineAdvice\":\"Set aside 15 minutes of AI-free deep reading/thinking time each day to let your brain get used to independent operation again.\",\"significantDeclineDesc\":\"Significant cognitive decline detected. You may have grown accustomed to letting AI do the thinking that you should be doing yourself.\",\"significantDeclineAdvice\":\"Take action now: 1) Reduce AI usage by 50% for one week 2) Do one logic puzzle daily without AI 3) Retest after one month.\",\"severeDeclineDesc\":\"Your cognitive score is in the lowest range. Long-term reliance on AI to replace independent thinking has had a clear impact. Your brain is experiencing the \\\"use it or lose it\\\" effect.\",\"severeDeclineAdvice\":\"Take this signal seriously. We recommend: 1) Start daily cognitive training immediately 2) Gradually extend AI-free thinking sessions 3) Develop a \\\"think first, then ask AI\\\" habit 4) Re-evaluate after one month.\"},\"question\":{\"category\":{\"logic\":\"Logic Reasoning\",\"sequence\":\"Sequence Reasoning\",\"math\":\"Mental Math\",\"vocab\":\"Vocabulary\",\"event\":\"Event Sequence\",\"event-cause\":\"Causal Inference\",\"event-argument\":\"Argument Analysis\"},\"multiSelect\":\"Multi-select\",\"multiSelectHint\":\"Select all correct answers\"},\"lockedSelection\":\"No changing your answer—after all, real fools don't get do-overs.\",\"handSlipButton\":\"I slipped!\",\"handSlipButton2\":\"You can't be slipping again!\",\"handSlipFirst\":\"Alright, I'll trust you this once\",\"handSlipSecond\":\"Wash those hands—no more slipping!\",\"toast\":{\"resumeRestored\":\"Previous progress restored\",\"resultCopied\":\"Result copied ✓\",\"notificationUnsupported\":\"Your browser does not support notifications\",\"notificationSet\":\"You will be reminded in 7 days ✓\",\"reminderBody\":\"Last time you scored {tier}, 7 days have passed—has your cognitive state changed?\",\"reminderTitle\":\"Cognitive Rustproof · Time for Retest\",\"notificationDenied\":\"Notification permission is required to remind you\",\"downloadStarted\":\"Generating image...\",\"downloadSuccess\":\"Result image saved ✓\",\"downloadFailed\":\"Failed to generate image\",\"notifConfirmTitle\":\"Notification Set\",\"notifConfirmBody\":\"We'll remind you to retest in 7 days\"},\"status\":{\"blocked\":\"The site has been blocked by Vercel due to bandwidth limits. We are migrating — back soon.\",\"pageTitle\":\"System Status\",\"pageSubtitle\":\"Real-time system metrics and usage statistics\",\"requestsToday\":\"Requests Today\",\"requestsTodayUtc\":\"Requests Today (UTC)\",\"hourlyTraffic\":\"Hourly Traffic\",\"localTime\":\"local time\",\"cpuP50\":\"CPU P50\",\"cpuP99\":\"CPU P99\",\"errors\":\"Errors\",\"d1Reads\":\"D1 Reads\",\"d1Writes\":\"D1 Writes\",\"d1Detail\":\"D1 Details\",\"rowsRead\":\"Rows Read\",\"rowsWritten\":\"Rows Wri

":\"请了奶茶的朋友们\",\"totalCount\":\"共 {count} 位支持者\",\"cacheNote\":\"数据每 5 分钟更新\"},\"stats\":{\"pageTitle\":\"全平台统计\",\"pageSubtitle\":\"认知防锈 · 基线测试\",\"loading\":\"加载中...\",\"errorTitle\":\"暂时无法获取统计数据\",\"emptyTitle\":\"还没有数据\",\"emptyDesc\":\"成为第一个完成测试的人吧！\",\"emptyCta\":\"开始测试\",\"totalTests\":\"总测试数\",\"avgDegradation\":\"平均退化指数\",\"yourRank\":\"排名\",\"ranking\":\"超过 {count} 人\",\"rankedBehind\":\"被 {count} 人超过\",\"tied\":\"持平 {count} 人\",\"distributionTitle\":\"退化指数分布\",\"distributionDesc\":\"大部分人的得分集中在哪个区间\",\"aiGroupTitle\":\"按 AI 使用量分组\",\"aiGroupDesc\":\"各组人数与平均退化指数\",\"tierTitle\":\"等级分布\",\"trendTitle\":\"个人趋势\",\"trendDesc\":\"你的 {count} 次测试记录\",\"trendOverall\":\"综合\",\"trendLogic\":\"逻辑\",\"trendMath\":\"速算\",\"trendVocab\":\"词汇\",\"trendEvent\":\"事理\",\"trendFirst\":\"首次\",\"trendLatest\":\"最新\",\"trendFlat\":\"→ 持平\",\"trendAxis\":\"测试次数\",\"privacyNote\":\"所有数据匿名收集，仅用于生成统计分布\",\"aiLevelSuffix\":\"人\",\"trendAria\":\"个人退化指数趋势\",\"estimationTitle\":\"评估方式分布\",\"estimationIRT\":\"IRT 自适应评估\",\"noData\":\"暂无数据\",\"notEnough\":\"数据不足\",\"estimationFixed\":\"固定百分比评分\",\"aboutLink\":\"关于\",\"author\":\"简律纯\",\"otherGame\":\"另一个游戏\",\"ddlRoast\":\"烤死线(活了)\",\"otherXingce\":\"另一个行测\",\"estimationMixedDesc\":\"IRT 自适应会根据能力动态调整题目难度；固定百分比每题权重相同。\",\"estimationIrtOnlyDesc\":\"目前所有测试均使用 IRT 自适应评估——题目难度根据你的能力水平实时调整。\",\"estimationPctOnlyDesc\":\"目前所有测试均使用固定百分比评分——每道题权重相同。\",\"abuseWarningTitle\":\"数据真实性提示\",\"abuseWarningDesc\":\"近期监测到有脚本批量刷分行为，统计数据中包含未经校验的测试结果，部分档位数据可能存在偏差。我们已采取防护措施，感谢你的理解。\"},\"siteGoal\":{\"achieved\":\"目标已达成！\",\"title\":\"目标\",\"progressAchieved\":\"全站平均退化指数 {current}，低于目标 {goal}\",\"progressBelow\":\"全站平均退化指数 {current} → 目标 \u003c {goal}\",\"participants\":\"已有 {count} 人次参与测试 · 共同努力降低全站退化指数\"},\"about\":{\"title\":\"关于\",\"subtitle\":\"认知防锈 · 项目起源\",\"originTitle\":\"为什么做这个项目\",\"originP1\":\"2024 年以来，我发现自己越来越习惯把问题直接丢给 AI，而不是先自己想一想。遇到难题的第一反应从\\\"让我想想\\\"变成了\\\"让我问问\\\"。这种变化很舒服——但也让人不安。\",\"originP2\":\"\\\"认知防锈\\\"不是要否定 AI 工具的价值，而是提供一个简单的工具，让你能定期给自己的认知状态拍一张快照。不是为了证明什么，只是让趋势变得可见——因为看不见的东西，你不会在意。\",\"usageTitle\":\"怎么用\",\"usageP1\":\"完成 {count} 道混合题型（逻辑推理 / 速算 / 词汇语义 / 事件事理分析），每道题限时 {seconds} 秒。完成后你会得到一个认知活跃度评分（0-100）。分数越低越活跃。\",\"usageP2\":\"单次测试的分数意义有限——真正的价值在于复测。两次测试之间隔 7 天以上，把分数连起来看趋势。\",\"privacyTitle\":\"数据与隐私\",\"privacyP1\":\"我们不收集任何个人身份信息（没有 Cookie、没有用户 ID）。每次测试结果以匿名方式存储，仅用于生成全平台的统计分布图。你的个人历史记录保存在浏览器本地，不会上传。\",\"disclaimerTitle\":\"免责声明\",\"disclaimerP1\":\"部分题型由 AI 实时自适应生成，可能存在错误或不够严谨之处，还请见谅。\",\"disclaimerP2\":\"如发现题目错误，欢迎通过首页的 QQ 群反馈，帮助我们改进题库质量。\",\"disclaimerP3\":\"本测试仅供自我觉察参考，一次成绩说明不了什么，请勿过度解读或较真。趋势比单次分数更有意义。\",\"ossTitle\":\"开源\",\"ossP1\":\"认知防锈是一个开源项目。官方站点：\u003cofficialSite\u003ecortex.hydroroll.team\u003c/officialSite\u003e。源代码托管在 \u003cgithub\u003eGitHub\u003c/github\u003e，欢迎贡献代码与反馈。\",\"signature\":\"2026 年 5 月 7 日\\n简律纯\",\"footerBack\":\"返回测试\",\"irtTitle\":\"IRT 评分是怎么工作的\",\"irtP1\":\"本测试使用 \u003cstrong\u003e项目反应理论 (IRT)\u003c/strong\u003e，这也是 SAT、GRE 等专业考试背后的评分框架。和简单算正确率不同，IRT 会区分\u003cstrong\u003e你答对了哪些题\u003c/strong\u003e，而不仅仅是你答对了多少题。答错简单题扣分更重，答对难题加分更多。\",\"irtP2\":\"每道题有三个参数：\u003cstrong\u003e难度\u003c/strong\u003e（题目有多难）、\u003cstrong\u003e区分度\u003c/strong\u003e（题目区分不同能力水平的能力）、\u003cstrong\u003e猜测度\u003c/strong\u003e（纯猜对的概率）。三者构成一条 3PL 逻辑曲线，描述在任何能力水平下答对该题的几率。\",\"irtP3\":\"测试过程中，每当你答完一题，系统会重新估计你的能力值 (θ)，并选取能最大化 \u003cstrong\u003eFisher 信息量\u003c/strong\u003e 的下一题——也就是在当前估计水平下能提供最多信息的那道题。这就是为什么你答得好时题会变难，答得不好时题会变简单。\",\"irtP4\":\"测试结束时，你的能力 θ 通过 \u003cstrong\u003eEAP（期望后验估计）\u003c/strong\u003e 计算，这是一种贝叶斯方法，根据你全部答题的模式找到最可能的能力值。结果是一个以 logits 为单位的 θ 分数，通常在 −3 到 +3 之间。\",\"irtP5\":\"最后，θ 通过标准正态分布映射为百分位：θ = 0（平均水平）→ 第 50 百分位 → 退化指数 50。θ = +1.5（前约 7%）→ 退化指数约 7。由此得出你最终的 0–100 退化指数，\u003cstrong\u003e越低越好\u003c/strong\u003e。\",\"irtCtaPrefix\":\"想看完整技术细节？\",\"irtCtaLink\":\"阅读深度解析文章\",\"irtCtaSuffix\":\"。\"},\"share\":{\"loading\":\"正在跳转...\",\"clickHere\":\"点击这里\",\"titleLine\":\"测测你是不是被 AI 变成了笨蛋!\"},\"distribution\":{\"ariaLabel\":\"退化指数分布直方图\",\"xAxis\":\"退化指数\",\"userMarker\":\"你在这里\",\"yourResult\":\"你的结果\",\"exceeds\":\"超过 {pct}% 的参与者\",\"degradationLabel\":\"退化指数\"},\"tier\":{\"cognitivePeak\":\"认知巅峰\",\"mildDecline\":\"轻度退化\",\"moderateDecline\":\"中度退化\",\"significantDecline\":\"明显退化\",\"severeDecline\":\"严重退化\",\"cognitivePeakDesc\":\"你的核心认知能力处于极佳状态。即使频繁使用 AI 工具，你依然保持着独立的深度思考习惯。你很可能在使用 AI 时保持批判性思维，将其视为工具而非替代品。\",\"cognitivePeakAdvice\":\"继续保持你当前的使用习惯。你证明了 AI 和独立思考可以共存。\",\"mildDeclineDesc\":\"你的认知能力整体保持良好，但已经出现了一些轻微的退化信号。可能在某些类型的思考上开始不自觉依赖 AI。\",\"mildDeclineAdvice\":\"在请 AI 帮忙之前，先给自己 30 秒独立思考的时间。这个小习惯能有效阻止退化趋势。\",\"moderateDeclineDesc\":\"你的认知活跃度已经出现明显下降。日常过度依赖 AI 完成思考任务，可能在不知不觉中削弱了你的独立分析能力。\",\"moderateDeclineAdvice\":\"建议每天留出 15 分钟的「无 AI 深度阅读/思考时间」，让大脑重新习惯独立运转。\",\"significantDeclineDesc\":\"检测到显著的认知能力下降。你可能已经习惯了让 AI 替你完成本应由自己完成的思考工作。\",\"significantDeclineAdvice\":\"建议立即行动：1) 减少 50% 的 AI 使用量，持续一周 2) 每天做一道不借助 AI 的逻辑题 3) 一个月后重新测试。\",\"severeDeclineDesc\":\"你的认知评分处于最低区间。长期依赖 AI 替代独立思考已经产生了明显影响。你的大脑正在经历「用进废退」的效应。\",\"severeDeclineAdvice\":\"请认真对待这个信号。建议：1) 立即开始每日认知训练 2) 逐步延长不使用 AI 的连续思考时间 3) 培养先自己思考、再求助 AI 的习惯 4) 一个月后重新评估。\"},\"question\":{\"category\":{\"logic\":\"逻辑推理\",\"sequence\":\"数列推理\",\"math\":\"速算\",\"vocab\":\"词汇语义\",\"event\":\"事件排序\",\"event-cause\":\"因果推断\",\"event-argument\":\"论证分析\"},\"multiSelect\":\"多选\",\"multiSelectHint\":\"请勾选所有正确答案\"},\"lockedSelection\":\"不允许更改，毕竟真正的笨蛋就是没有后悔机会的\",\"handSlipButton\":\"我手滑了\",\"handSlipButton2\":\"你总不能又手滑了吧\",\"handSlipFirst\":\"好的我信你一次\",\"handSlipSecond\":\"去洗洗手吧，别再手滑了！\",\"toast\":{\"resumeRestored\":\"已恢复上次进度\",\"resultCopied\":\"结果已复制 ✓\",\"notificationUnsupported\":\"您的浏览器不支持通知功能\",\"notificationSet\":\"7 天后将提醒你 ✓\",\"reminderBody\":\"上次测得 {tier}，7 天过去了，你的认知状态有变化吗？\",\"reminderTitle\":\"认知防锈 · 该复测了\",\"notificationDenied\":\"需要允许通知权限才能提醒你\",\"downloadStarted\":\"正在生成图片…\",\"downloadSuccess\":\"结果图已保存 ✓\",\"downloadFailed\":\"生成图片失败\",\"notifConfirmTitle\":\"通知已设定\",\"notifConfirmBody\":\"7 天后我们会提醒你回来复测\"},\"articles\":{\"list\":{\"title\":\"文章\",\"subtitle\":\"探索认知健康、AI 依赖和独立思考背后的科学。\",\"readMore\":\"阅读全文\",\"cta\":\"去测试\",\"publishedOn\":\"发布于\",\"backToTest\":\"返回测试\",\"intro\":\"关于认知健康、AI 依赖和找回独立思考的思考。\"},\"ai-making-you-dumber\":{\"title\":\"AI 正在让你变笨吗？\",\"excerpt\":\"5 分钟的认知快照，揭示 AI 在你的大脑上留下了什么。\",\"body\":[\"\u003cp\u003e2024 年以来，一个悄然的变化发生了。面对难题时的第一反应不再是「让我想想」，而是「让我问问」。这种转变让人舒适，但也令人不安。\u003c/p\u003e\",\"\u003ch2\u003e「用进废退」的问题\u003c/h2\u003e\",\"\u003cp\u003e认知能力就像肌肉。当你把思考外包出去，肌肉就会萎缩。这不是猜测——这是认知神经科学中公认的原则。大脑会强化它使用的神经通路，修剪它不用的那些。\u003c/p\u003e\",\"\u003cp\u003eAI 工具是伟大的发明。它们让我们更快、更高效、更有能力。但当我们用它们来\u003cem\u003e替代\u003c/em\u003e思考而非\u003cem\u003e增强\u003c/em\u003e思考时，有些东西就丢失了。问题是：丢失了多少？\u003c/p\u003e\",\"\u003ch2\u003e让不可见的变得可见\u003c/h2\u003e\",\"\u003cp\u003e这就是我们建立认知防锈的原因。这不是智力测验。这是你当前认知状态的基线测量——一张当没有 AI 帮助时你大脑运转状况的快照。\u003c/p\u003e\",\"\u003cp\u003e20 道题。每题 40 秒。逻辑、速算、词汇。不允许 AI 辅助。完成后你会得到一个「退化指数」——0 到 100 之间的数字。越低越好。\u003c/p\u003e\",\"\u003ch2\u003e真正的价值在于趋势\u003c/h2\u003e\",\"\u003cp\u003e一次分数说明不了什么。间隔数周的两次测试，却能告诉你一切。指数上升了？这是个信号。下降了？同样是信号。趋势比快照更有意义。\u003c/p\u003e\",\"\u003cp\u003e把它想象成称体重——只不过它测量的是认知活跃度，而非体重。重点不是评判，而是看见。\u003c/p\u003e\",\"\u003cdiv style='margin-top:2rem;text-align:center'\u003e\u003ca href='/' style='display:inline-block;padding:10px 24px;background:#111;color:#fff;border-radius:8px;text-decoration:none;font-weight:500'\u003e开始测试 →\u003c/a\u003e\u003c/div\u003e\"]},\"brain-fitness-guide\":{\"title\":\"大脑防锈指南：7 天恢复独立思考\",\"excerpt\":\"七个日常习惯，重建认知独立性——无论你刚开始出现 AI 依赖的早期迹象，还是只想保持敏锐。\",\"body\":[\"\u003cp\u003e认知能力就像肌肉——用进废退。当 AI 替你完成思考，神经通路就会弱化。好消息是：它们可以被重建。以下是一个 7 天恢复独立思维的计划。\u003c/p\u003e\",\"\u003ch2\u003e第 1 天：「先想」规则\u003c/h2\u003e\",\"\u003cp\u003e在打开 ChatGPT、Claude 或任何 AI 工具之前，花 60 秒独立思考。先写下自己的答案——即使不完整。这个简单的习惯会建立一个心理检查点，防止自动外包思考。\u003c/p\u003e\",\"\u003ch2\u003e第 2 天：读 20 分钟纸质书\u003c/h2\u003e\",\"\u003cp\u003e不看屏幕。没有通知。只有你和印刷的文字。纸质阅读激活的神经回路与滑动屏幕完全不同——它要求持续注意力、线性推理和主动想象。选一本有点挑战性的书。\u003c/p\u003e\",\"\u003ch2\u003e第 3 天：做心算\u003c/h2\u003e\",\"\u003cp\u003e在收银台前算出购物总额。不靠手机分摊餐费。等咖啡时在脑海里做两位数乘法。心算是计算器/AI 依赖下最先萎缩的认知技能之一。\u003c/p\u003e\",\"\u003ch2\u003e第 4 天：不靠 AI 写 500 字\u003c/h2\u003e\",\"\u003cp\u003e不用语法检查器。不用 AI 建议。不用改写工具。只有你面对一页空白。写你关心的事。目标不是质量——而是在没有算法辅助的情况下，将想法组织成语言的过程。\u003c/p\u003e\",\"\u003ch2\u003e第 5 天：解一道逻辑题\u003c/h2\u003e\",\"\u003cp\u003e数独。一道象棋问题。一个谜语。纸上编程挑战。需要多步推理的事情。别看提示。忍受不知道的不适——这才是认知成长发生的地方。\u003c/p\u003e\",\"\u003ch2\u003e第 6 天：深入交谈一小时\u003c/h2\u003e\",\"\u003cp\u003e和某人聊一小时——不看手机，不分心。争辩一个观点。解释复杂的东西。认真倾听，深思熟虑地回应。实时对话是终极认知训练：你必须同时思考、处理和组织语言。\u003c/p\u003e\",\"\u003ch2\u003e第 7 天：复测与反思\u003c/h2\u003e\",\"\u003cp\u003e再做一次认知防锈测试。和基线对比。变化了吗？这次感觉有什么不同？分数不如你对它的意识重要。趋势 \u003e 快照。\u003c/p\u003e\",\"\u003cp\u003e认知健康不是拒绝 AI——而是保持独立思考的选择权，当它真正重要时。持续测量。持续觉察。\u003c/p\u003e\",\"\u003cdiv style='margin-top:2rem;text-align:center'\u003e\u003ca href='/' style='display:inline-block;padding:10px 24px;background:#111;color:#fff;border-radius:8px;text-decoration:none;font-weight:500'\u003e检测你的基线 →\u003c/a\u003e\u003c/div\u003e\"]},\"how-cognitive-test-works\":{\"title\":\"这个测试凭什么能测出你的认知状态\",\"excerpt\":\"20 道题背后是一个基于项目反应理论的自适应引擎，能根据你的能力水平动态调整。来看看它是如何产生有意义的分数的。\",\"body\":[\"\u003cp\u003e大多数在线测试给你一堆固定题目和一个百分比分数。认知防锈做的不一样——它使用项目反应理论（IRT），与 SAT、GRE 和专业认证考试使用的框架相同。\u003c/p\u003e\",\"\u003ch2\u003e什么是 IRT？\u003c/h2\u003e\",\"\u003cp\u003e项目反应理论基于两个因素来建模正确回答的概率：人的能力（theta）和题目的特征（难度、区分度）。与百分比计分不同，IRT 关注你\u003cem\u003e做对了哪些\u003c/em\u003e题，而不仅仅是\u003cem\u003e做对了多少\u003c/em\u003e。\u003c/p\u003e\",\"\u003cp\u003e答错简单题比答错难题扣分更多。答对难题比答对简单题加分更多。这使得分数比简单的百分比更有信息量。\u003c/p\u003e\",\"\u003ch2\u003e三个维度\u003c/h2\u003e\",\"\u003cp\u003e测试涵盖三个认知领域：\u003c/p\u003e\",\"\u003cul\u003e\u003cli\u003e\u003cstrong\u003e逻辑推理\u003c/strong\u003e——模式识别、逻辑演绎、序列思维\u003c/li\u003e\u003cli\u003e\u003cstrong\u003e速算\u003c/strong\u003e——算术流畅度、数值估算、计算速度\u003c/li\u003e\u003cli\u003e\u003cstrong\u003e词汇语义\u003c/strong\u003e——词汇知识、语义理解、语言推理\u003c/li\u003e\u003c/ul\u003e\",\"\u003cp\u003e每个维度独立校准，测试在三个维度间轮转以构建均衡的画像。\u003c/p\u003e\",\"\u003ch2\u003e自适应选题\u003c/h2\u003e\",\"\u003cp\u003e当你回答每道题时，系统会更新对你能力的估计，并选择下一道能最大化信息量的题目。这叫做 EAP（期望后验）估计配合 Fisher 信息量最大化。\u003c/p\u003e\",\"\u003cp\u003e用人话说：你做得好时题目会变难，做得差时变简单——不是为了为难你或放水，而是因为接近你能力水平的题目能提供最多信息。\u003c/p\u003e\",\"\u003ch2\u003e从 Theta 到退化指数\u003c/h2\u003e\",\"\u003cp\u003e你的最终 theta 估计值通过正态分布（标准正态 CDF）映射到百分位数。退化指数就是 100 减去你的百分位数。50 分意味着你处于人群平均水平。10 分意味着你在前 10%。\u003c/p\u003e\",\"\u003ch2\u003e为什么趋势很重要\u003c/h2\u003e\",\"\u003cp\u003e没有测试是完美的，测量误差必然存在。这就是我们强调复测的原因——多次测量的趋势远比单次分数可靠。就像追踪体重：一次读数说明不了什么，但随时间变化的趋势告诉你一切。\u003c/p\u003e\",\"\u003cp\u003e目标不是一个数字，而是觉察。因为你无法衡量的东西，你也不会去改善。\u003c/p\u003e\",\"\u003cdiv style='margin-top:2rem;text-align:center'\u003e\u003ca href='/' style='display:inline-block;padding:10px 24px;background:#111;color:#fff;border-radius:8px;text-decoration:none;font-weight:500'\u003e开始测试 →\u003c/a\u003e\u003c/div\u003e\"]}},\"status\":{\"blocked\":\"由于站点访问人数过多，相关站点已被 Vercel 因超限问题 Block。正在加班自掏腰包迁移中，稍后恢复访问。\",\"pageTitle\":\"系统状态\",\"pageSubtitle\":\"实时系统指标与使用统计\",\"requestsToday\":\"今日请求\",\"requestsTodayUtc\":\"今日请求 (UTC)\",\"hourlyTraffic\":\"每小时请求\",\"localTime\":\"本地时间\",\"cpuP50\":\"CPU P50\",\"cpuP99\":\"CPU P99\",\"errors\":\"错误数\",\"d1Reads\":\"D1 读取\",\"d1Writes\":\"D1 写入\",\"d1Detail\":\"D1 详情\",\"rowsRead\":\"读取行数\",\"rowsWritten\":\"写入行数\",\"kvReads\":\"KV 读取\",\"kvWrites\":\"KV 写入\",\"kvLists\":\"KV 列表\",\"kvDeletes\":\"KV 删除\",\"neuronsUsed\":\"今日已用神经元\",\"neuronsRemaining\":\"今日剩余神经元\",\"ofLimit\":\"/ {limit}\",\"tokensToday\":\"今日 Token 用量\",\"tokensTodayUtc\":\"今日 Token 用量 (UTC)\",\"poolSize\":\"AI题目池大小\",\"generatedToday\":\"今日生成 {count} 题\",\"generatedTodayUtc\":\"今日生成 {count} 题 (UTC)\",\"avgNeuronCost\":\"平均成本\",\"perQuestion\":\"每道题\",\"aiDetail\":\"AI 详情\",\"inputTokens\":\"输入 Tokens\",\"outputTokens\":\"输出 Tokens\",\"totalTests\":\"总测试数\",\"activeLicenses\":\"活跃许可\",\"itemResponses\":\"答题记录\",\"avgDegradation\":\"平均退化指数\",\"cached\":\"已缓存\",\"live\":\"实时\",\"error\":\"加载失败\",\"retry\":\"重试\",\"degradationTrend\":\"退化指数趋势\",\"autoRefresh\":\"每 5 分钟自动刷新 · 数据来自 Cloudflare API\",\"requestsMonth\":\"30

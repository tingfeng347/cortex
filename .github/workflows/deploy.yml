name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Default: read-only. The deploy job escalates to write on trusted events.
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - run: pnpm install --no-frozen-lockfile --ignore-scripts

      - run: pnpm build

      - uses: actions/upload-artifact@v4
        with:
          name: out
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    # Only push to gh-pages on main pushes and manual runs — never on PRs.
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: out
          path: ./out

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          force_orphan: true
